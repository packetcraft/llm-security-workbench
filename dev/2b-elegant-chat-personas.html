<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ollama Ultimate Workbench</title>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

        <style>
            :root {
                --bg: #f4f4f9;
                --panel: #ffffff;
                --text: #333;
                --primary: #007bff;
                --border: #ddd;
                --danger: #dc3545;
            }
            body.dark {
                --bg: #121212;
                --panel: #1e1e1e;
                --text: #e0e0e0;
                --primary: #3793ff;
                --border: #333;
            }

            body {
                font-family: -apple-system, system-ui, sans-serif;
                max-width: 1000px;
                margin: 20px auto;
                background-color: var(--bg);
                color: var(--text);
                transition: 0.3s;
                padding: 0 20px;
            }

            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 15px;
            }
            #chat-box {
                height: 550px;
                border-radius: 12px;
                border: 1px solid var(--border);
                background: var(--panel);
                overflow-y: auto;
                padding: 25px;
                margin-bottom: 20px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
                scroll-behavior: smooth;
            }

            /* Layout for Settings */
            .settings-bar {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
                margin-bottom: 15px;
                background: var(--panel);
                padding: 20px;
                border-radius: 12px;
                border: 1px solid var(--border);
            }
            .setting-item {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            label {
                font-size: 11px;
                font-weight: bold;
                text-transform: uppercase;
                letter-spacing: 0.8px;
                opacity: 0.6;
            }

            textarea,
            select {
                padding: 12px;
                border-radius: 8px;
                border: 1px solid var(--border);
                background: var(--panel);
                color: var(--text);
                font-size: 14px;
                font-family: inherit;
                transition: border 0.2s;
            }
            textarea:focus {
                border-color: var(--primary);
                outline: none;
            }

            /* Input Area */
            .input-container {
                background: var(--panel);
                padding: 20px;
                border-radius: 12px;
                border: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            #user-input {
                min-height: 80px;
                max-height: 300px;
                line-height: 1.5;
            }

            .button-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .group {
                display: flex;
                gap: 8px;
            }

            button {
                padding: 10px 20px;
                border-radius: 8px;
                border: none;
                background: var(--primary);
                color: white;
                cursor: pointer;
                font-weight: bold;
                transition: 0.2s;
                display: flex;
                align-items: center;
                gap: 5px;
            }
            button:hover {
                filter: brightness(1.1);
                transform: translateY(-1px);
            }
            button:active {
                transform: translateY(0);
            }
            .btn-secondary {
                background: #4a4a4a;
            }
            .btn-danger {
                background: var(--danger);
            }
            button:disabled {
                background: #6c757d;
                cursor: not-allowed;
                opacity: 0.6;
            }

            /* Typography */
            .message {
                margin-bottom: 30px;
                line-height: 1.7;
                border-bottom: 1px solid var(--border);
                padding-bottom: 25px;
                animation: fadeIn 0.3s ease-in;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(5px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .role-label {
                font-weight: 800;
                font-size: 10px;
                text-transform: uppercase;
                margin-bottom: 10px;
                display: block;
                letter-spacing: 1px;
            }
            .user-label {
                color: var(--primary);
            }
            .bot-label {
                color: #28a745;
            }

            pre {
                background: #141414;
                padding: 15px;
                border-radius: 8px;
                overflow-x: auto;
                border: 1px solid #333;
            }
            code {
                font-family: "Fira Code", monospace;
                font-size: 13px;
            }

            .cursor {
                display: inline-block;
                width: 8px;
                height: 16px;
                background: #28a745;
                margin-left: 5px;
                animation: blink 1s infinite;
                vertical-align: middle;
            }
            @keyframes blink {
                50% {
                    opacity: 0;
                }
            }
        </style>
    </head>
    <body class="dark">
        <div class="header">
            <h2>Ollama Ultimate Workbench ⚡</h2>
            <button
                class="theme-toggle"
                onclick="document.body.classList.toggle('dark')"
            >
                🌓 Theme
            </button>
        </div>

        <div class="settings-bar">
            <div class="setting-item">
                <label>1. Model Selector</label>
                <select id="model-select">
                    <option>Loading models...</option>
                </select>
            </div>
            <div class="setting-item">
                <label>2. Persona Library</label>
                <select id="persona-select" onchange="applyPersona()">
                    <option value="">-- Select a Persona --</option>
                    <optgroup label="Standard">
                        <option value="architect">
                            Code Architect (Python/Expert)
                        </option>
                        <option value="eli5">ELI5 (Scientific Educator)</option>
                        <option value="auditor">Cyber Security Auditor</option>
                    </optgroup>
                    <optgroup label="Creative & Logic">
                        <option value="refiner">Professional Editor</option>
                        <option value="db_guru">Database Guru (SQL)</option>
                        <option value="storyteller">
                            Creative Storyteller
                        </option>
                        <option value="socratic">Socratic Tutor</option>
                    </optgroup>
                    <optgroup
                        label="Custom"
                        id="custom-personas-group"
                    ></optgroup>
                </select>
            </div>
            <div class="setting-item" style="grid-column: span 2">
                <label>3. System Instructions</label>
                <textarea
                    id="system-prompt"
                    rows="2"
                    placeholder="Instructions that define AI behavior..."
                ></textarea>
                <div style="margin-top: 5px">
                    <button
                        class="btn-secondary"
                        style="font-size: 10px; padding: 5px 10px"
                        onclick="saveCustomPersona()"
                    >
                        💾 Save as Custom Persona
                    </button>
                </div>
            </div>
        </div>

        <div id="chat-box"></div>

        <div class="input-container">
            <label>4. Your Message</label>
            <textarea
                id="user-input"
                placeholder="Enter your prompt... (Shift+Enter for newline)"
                onkeydown="handleKey(event)"
            ></textarea>
            <div class="button-row">
                <div class="group">
                    <button class="btn-secondary" onclick="clearChat()">
                        🗑️ Clear
                    </button>
                    <button
                        id="stop-btn"
                        class="btn-danger"
                        onclick="stopGeneration()"
                        disabled
                    >
                        🛑 Stop
                    </button>
                </div>
                <button id="send-btn" onclick="sendMessage()">
                    🚀 Send Message
                </button>
            </div>
        </div>

        <script>
            let controller; // For AbortController
            let fullResponse = "";

            const basePersonas = {
                architect:
                    "You are an expert Senior Software Engineer. Explain logic in bullet points, then provide clean, commented Python code.",
                eli5: "You are a science communicator. Explain complex concepts to a 10-year-old using metaphors and no jargon.",
                auditor:
                    "You are a professional Cyber Security Auditor. Analyze code for OWASP Top 10 vulnerabilities and provide remediation.",
                refiner:
                    "You are a professional editor. Rewrite text to be concise, clear, and executive-level.",
                db_guru:
                    "You are a Database Administrator. Convert requests to optimized SQL and explain indexes/joins.",
                storyteller:
                    "You are an award-winning novelist. Focus on 'show, don't tell' and rich sensory details.",
                socratic:
                    "You are a Socratic Tutor. Never give answers. Ask 2-3 questions to lead the user to the answer.",
            };

            marked.setOptions({
                highlight: (code) => hljs.highlightAuto(code).value,
                breaks: true,
            });

            // Initialize
            async function init() {
                await fetchModels();
                loadCustomPersonas();
            }
            init();

            async function fetchModels() {
                const selector = document.getElementById("model-select");
                try {
                    const response = await fetch(
                        "http://localhost:11434/api/tags",
                    );
                    const data = await response.json();
                    selector.innerHTML = data.models
                        .map((m) => {
                            const isDefault =
                                m.name.includes("llama3.2") ||
                                m.name.includes("3b");
                            return `<option value="${m.name}" ${isDefault ? "selected" : ""}>${m.name}</option>`;
                        })
                        .join("");
                } catch (e) {
                    selector.innerHTML = "<option>Ollama Offline</option>";
                }
            }

            function applyPersona() {
                const val = document.getElementById("persona-select").value;
                const custom = JSON.parse(
                    localStorage.getItem("customPersonas") || "{}",
                );
                document.getElementById("system-prompt").value =
                    basePersonas[val] || custom[val] || "";
            }

            function saveCustomPersona() {
                const prompt = document
                    .getElementById("system-prompt")
                    .value.trim();
                if (!prompt) return alert("System prompt is empty.");
                const name = prompt("Name your custom persona:");
                if (!name) return;

                const custom = JSON.parse(
                    localStorage.getItem("customPersonas") || "{}",
                );
                custom[name] = prompt;
                localStorage.setItem("customPersonas", JSON.stringify(custom));
                loadCustomPersonas();
                alert("Persona saved!");
            }

            function loadCustomPersonas() {
                const group = document.getElementById("custom-personas-group");
                const custom = JSON.parse(
                    localStorage.getItem("customPersonas") || "{}",
                );
                group.innerHTML = Object.keys(custom)
                    .map((name) => `<option value="${name}">${name}</option>`)
                    .join("");
            }

            function handleKey(e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            }

            function stopGeneration() {
                if (controller) {
                    controller.abort();
                    console.log("Generation stopped by user.");
                }
            }

            function clearChat() {
                document.getElementById("chat-box").innerHTML = "";
                fullResponse = "";
            }

            async function sendMessage() {
                const input = document.getElementById("user-input");
                const chatBox = document.getElementById("chat-box");
                const sendBtn = document.getElementById("send-btn");
                const stopBtn = document.getElementById("stop-btn");

                if (!input.value.trim() || sendBtn.disabled) return;

                const userPrompt = input.value;
                chatBox.innerHTML += `<div class="message"><span class="role-label user-label">USER</span>${userPrompt}</div>`;
                input.value = "";

                // UI State
                sendBtn.disabled = true;
                stopBtn.disabled = false;
                controller = new AbortController();

                const botDiv = document.createElement("div");
                botDiv.className = "message";
                botDiv.innerHTML = `<span class="role-label bot-label">AI ASSISTANT</span><span class="content"></span><span class="cursor"></span>`;
                chatBox.appendChild(botDiv);
                const contentSpan = botDiv.querySelector(".content");

                fullResponse = "";
                let buffer = "";

                try {
                    const response = await fetch(
                        "http://localhost:11434/api/chat",
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            signal: controller.signal,
                            body: JSON.stringify({
                                model: document.getElementById("model-select")
                                    .value,
                                messages: [
                                    {
                                        role: "system",
                                        content:
                                            document.getElementById(
                                                "system-prompt",
                                            ).value,
                                    },
                                    { role: "user", content: userPrompt },
                                ],
                                stream: true,
                            }),
                        },
                    );

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value);
                        let lines = buffer.split("\n");
                        buffer = lines.pop();

                        for (const line of lines) {
                            if (!line.trim()) continue;
                            const json = JSON.parse(line);
                            if (json.message?.content) {
                                fullResponse += json.message.content;
                                contentSpan.innerHTML =
                                    marked.parse(fullResponse);
                                botDiv
                                    .querySelectorAll("pre code")
                                    .forEach((el) => hljs.highlightElement(el));
                                chatBox.scrollTop = chatBox.scrollHeight;
                            }
                        }
                    }
                } catch (error) {
                    if (error.name === "AbortError") {
                        contentSpan.innerHTML += `<p><i>[Generation stopped by user]</i></p>`;
                    } else {
                        contentSpan.innerHTML += `<p style="color:var(--danger)">Error: ${error.message}</p>`;
                    }
                } finally {
                    botDiv.querySelector(".cursor")?.remove();
                    sendBtn.disabled = false;
                    stopBtn.disabled = true;
                    input.focus();
                }
            }
        </script>
    </body>
</html>
