<!doctype html>
<html>
    <head>
        <title>My Custom Ollama Chat</title>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <style>
            body {
                font-family: sans-serif;
                max-width: 600px;
                margin: 20px auto;
            }
            #chat-box {
                height: 300px;
                border: 1px solid #ccc;
                overflow-y: scroll;
                padding: 10px;
                margin-bottom: 10px;
            }
            #user-input {
                width: 80%;
                padding: 10px;
            }
            .user {
                color: blue;
                font-weight: bold;
            }
            .bot {
                color: green;
                font-weight: bold;
            }
            .bot-content p          { margin: 4px 0; line-height: 1.6; }
            .bot-content strong     { font-weight: bold; }
            .bot-content em         { font-style: italic; color: #555; }
            .bot-content h1,
            .bot-content h2,
            .bot-content h3         { margin: 8px 0 4px; font-size: 14px; }
            .bot-content ul,
            .bot-content ol         { margin: 4px 0 4px 20px; }
            .bot-content li         { margin: 2px 0; line-height: 1.6; }
            .bot-content code       { background: #f0f0f0; padding: 1px 4px;
                                      border-radius: 3px; font-family: monospace; }
            .bot-content pre        { background: #f0f0f0; padding: 10px;
                                      margin: 6px 0; overflow-x: auto;
                                      border-radius: 4px; }
            .bot-content pre code   { background: none; padding: 0; }
            .bot-content blockquote { border-left: 3px solid #ccc; margin: 6px 0;
                                      padding-left: 10px; color: #666; }
            .bot-content a          { color: blue; }
        </style>
    </head>
    <body>
        <h2>Ollama Custom UI</h2>
        <div id="chat-box"></div>
        <input type="text" id="user-input" placeholder="Ask something..." />
        <button onclick="sendMessage()">Send</button>

        <script>
            async function sendMessage() {
                const input = document.getElementById("user-input");
                const chatBox = document.getElementById("chat-box");
                const prompt = input.value;
                if (!prompt) return;

                // Display user message
                chatBox.innerHTML += `<div><span class="user">You:</span> ${prompt}</div>`;
                input.value = "";

                try {
                    const response = await fetch(
                        "http://localhost:11434/api/generate",
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                model: "llama3.2:3b", // Ensure you have this model pulled
                                prompt: prompt,
                                stream: false, // Keep it simple for now
                            }),
                        },
                    );

                    const data = await response.json();
                    chatBox.innerHTML += `<div><span class="bot">Ollama:</span></div><div class="bot-content">${marked.parse(data.response)}</div>`;
                    chatBox.scrollTop = chatBox.scrollHeight;
                } catch (error) {
                    chatBox.innerHTML += `<div style="color:red">Error: ${error.message}. Make sure Ollama is running.</div>`;
                }
            }
        </script>
    </body>
</html>
