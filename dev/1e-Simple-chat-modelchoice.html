<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ollama Streaming UI</title>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <style>
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                max-width: 800px;
                margin: 40px auto;
                background-color: #f4f4f9;
                padding: 0 20px;
            }
            h2 {
                color: #333;
                text-align: center;
            }
            #chat-box {
                height: 500px;
                border-radius: 12px;
                border: 1px solid #ddd;
                background: white;
                overflow-y: auto;
                padding: 20px;
                margin-bottom: 20px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }

            /* Model Selector Styling */
            .controls {
                display: flex;
                gap: 10px;
                margin-bottom: 20px;
                align-items: center;
                justify-content: center;
            }
            select {
                padding: 8px 12px;
                border-radius: 8px;
                border: 1px solid #ccc;
                background: white;
                font-size: 14px;
                cursor: pointer;
            }

            .input-group {
                display: flex;
                gap: 10px;
            }
            #user-input {
                flex-grow: 1;
                padding: 12px;
                border-radius: 8px;
                border: 1px solid #ccc;
                outline: none;
            }
            #user-input:focus {
                border-color: #007bff;
            }
            button {
                padding: 10px 20px;
                border-radius: 8px;
                border: none;
                background: #007bff;
                color: white;
                cursor: pointer;
                font-weight: bold;
            }
            button:hover {
                background: #0056b3;
            }
            button:disabled {
                background: #ccc;
                cursor: not-allowed;
            }

            .message {
                margin-bottom: 20px;
                line-height: 1.6;
            }
            .user {
                color: #007bff;
                font-weight: bold;
                display: block;
                margin-bottom: 5px;
            }
            .bot {
                color: #28a745;
                font-weight: bold;
                display: block;
                margin-bottom: 5px;
            }
            .content p {
                margin: 5px 0;
            }
            .cursor {
                display: inline-block;
                width: 8px;
                height: 15px;
                background: #28a745;
                margin-left: 5px;
                animation: blink 1s infinite;
                vertical-align: middle;
            }
            @keyframes blink {
                50% {
                    opacity: 0;
                }
            }
        </style>
    </head>
    <body>
        <h2>MeChat (Local) ⚡</h2>

        <div class="controls">
            <label for="model-select">Select Model:</label>
            <select id="model-select">
                <option value="">Loading models...</option>
            </select>
            <button
                onclick="fetchModels()"
                style="padding: 5px 10px; background: #6c757d; font-size: 12px"
            >
                Refresh List
            </button>
        </div>

        <div id="chat-box"></div>

        <div class="input-group">
            <input
                type="text"
                id="user-input"
                placeholder="Type your message..."
                onkeypress="if (event.key === 'Enter') sendMessage();"
            />
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>

        <script>
            let fullResponse = "";

            // 2. Function to fetch available models from Ollama
            async function fetchModels() {
                const selector = document.getElementById("model-select");
                try {
                    const response = await fetch(
                        "http://localhost:11434/api/tags",
                    );
                    const data = await response.json();

                    selector.innerHTML = ""; // Clear "Loading..."

                    if (data.models && data.models.length > 0) {
                        data.models.forEach((m) => {
                            const option = document.createElement("option");
                            option.value = m.name;
                            option.textContent = m.name;
                            selector.appendChild(option);
                        });
                    } else {
                        selector.innerHTML =
                            '<option value="">No models found</option>';
                    }
                } catch (error) {
                    console.error("Failed to fetch models:", error);
                    selector.innerHTML =
                        '<option value="">Error loading models</option>';
                }
            }

            // Initialize models on load
            fetchModels();

            async function sendMessage() {
                const input = document.getElementById("user-input");
                const chatBox = document.getElementById("chat-box");
                const sendBtn = document.getElementById("send-btn");
                const modelSelect = document.getElementById("model-select");
                const prompt = input.value.trim();

                if (!prompt) return;
                if (!modelSelect.value) {
                    alert("Please select a model first!");
                    return;
                }

                chatBox.innerHTML += `<div class="message"><span class="user">You:</span> ${prompt}</div>`;
                input.value = "";
                input.disabled = true;
                sendBtn.disabled = true;

                const botMessageDiv = document.createElement("div");
                botMessageDiv.className = "message";
                botMessageDiv.innerHTML = `<span class="bot">Ollama (${modelSelect.value}):</span> <span class="content"></span><span class="cursor"></span>`;
                chatBox.appendChild(botMessageDiv);

                const contentSpan = botMessageDiv.querySelector(".content");
                const cursor = botMessageDiv.querySelector(".cursor");

                fullResponse = "";

                try {
                    const response = await fetch(
                        "http://localhost:11434/api/generate",
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                model: modelSelect.value, // 3. Pass selected model here
                                prompt: prompt,
                                stream: true,
                            }),
                        },
                    );

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split("\n");

                        for (const line of lines) {
                            if (!line.trim()) continue;
                            const json = JSON.parse(line);
                            if (json.response) {
                                fullResponse += json.response;
                                contentSpan.innerHTML =
                                    marked.parse(fullResponse);
                                chatBox.scrollTop = chatBox.scrollHeight;
                            }
                        }
                    }
                } catch (error) {
                    contentSpan.innerHTML += `<span style="color:red"><br>Error: ${error.message}</span>`;
                } finally {
                    input.disabled = false;
                    sendBtn.disabled = false;
                    cursor.remove();
                    input.focus();
                }
            }
        </script>
    </body>
</html>
