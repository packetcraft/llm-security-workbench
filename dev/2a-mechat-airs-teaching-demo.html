<!doctype html>
<html>

<head>
    <title>AIRS Teaching — Prompt Scan Gate</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Courier New", Courier, monospace;
            background: #0d0d0d;
            color: #c8c8c8;
            max-width: 780px;
            margin: 0 auto;
            padding: 20px 20px 12px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h2 {
            color: #00ff88;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        #subtitle {
            color: #555;
            font-size: 12px;
            margin-bottom: 16px;
        }

        #chat-box {
            flex: 1;
            min-height: 0;
            border: 1px solid #2a2a2a;
            background: #111;
            overflow-y: scroll;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        #chat-box p {
            margin: 6px 0;
            line-height: 1.6;
        }

        #user-input {
            padding: 8px 12px;
            background: #111;
            border: 1px solid #333;
            color: #c8c8c8;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }

        #user-input:focus {
            border-color: #00ff88;
        }

        button {
            padding: 8px 16px;
            background: #0d0d0d;
            border: 1px solid #00ff88;
            color: #00ff88;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #00ff88;
            color: #0d0d0d;
        }

        .user {
            color: #00aaff;
            font-weight: bold;
        }

        .bot {
            color: #00ff88;
            font-weight: bold;
        }

        .block {
            color: #ff4444;
            font-weight: bold;
        }

        .airs-badge {
            font-size: 10px;
            padding: 1px 7px;
            border-radius: 2px;
            margin-left: 8px;
            vertical-align: middle;
            letter-spacing: 0.5px;
        }

        .airs-badge.scanning {
            background: #1a1a1a;
            color: #555;
            border: 1px solid #333;
        }

        .airs-badge.allowed {
            background: #0a1f0a;
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .airs-badge.blocked {
            background: #1f0a0a;
            color: #ff4444;
            border: 1px solid #ff4444;
        }

        .inline-select {
            background: transparent;
            border: none;
            border-bottom: 1px solid #444;
            color: #00ccff;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            outline: none;
            padding: 0 2px;
        }

        .inline-select:focus {
            border-bottom-color: #00ccff;
        }

        .inline-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #444;
            color: #00ccff;
            font-family: inherit;
            font-size: 12px;
            outline: none;
            padding: 0 2px;
            width: 220px;
        }

        .inline-input::placeholder {
            color: #444;
        }

        .inline-input:focus {
            border-bottom-color: #00ccff;
        }

        #airs-toggle {
            padding: 0;
            background: transparent;
            border: none;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            color: #00ccff;
        }

        #airs-toggle:hover {
            background: transparent;
            color: #fff;
        }

        /* ── terminal markdown ── */
        .bot-content p          { margin: 4px 0; line-height: 1.6; }
        .bot-content strong     { color: #ffffff; font-weight: bold; }
        .bot-content em         { color: #aaaaaa; font-style: italic; }
        .bot-content h1,
        .bot-content h2,
        .bot-content h3         { color: #00ff88; letter-spacing: 1px;
                                  margin: 10px 0 4px; font-size: 13px;
                                  text-transform: uppercase; }
        .bot-content ul,
        .bot-content ol         { margin: 4px 0 4px 18px; }
        .bot-content li         { margin: 2px 0; line-height: 1.6; }
        .bot-content code       { background: #1a1a1a; color: #00ff88;
                                  padding: 1px 5px; border-radius: 2px;
                                  font-family: inherit; font-size: 12px;
                                  border: 1px solid #2a2a2a; }
        .bot-content pre        { background: #111; border: 1px solid #2a2a2a;
                                  padding: 10px 14px; margin: 6px 0;
                                  overflow-x: auto; border-radius: 2px; }
        .bot-content pre code   { background: none; border: none;
                                  padding: 0; color: #c8c8c8; }
        .bot-content blockquote { border-left: 3px solid #333; margin: 6px 0;
                                  padding-left: 10px; color: #666; }
        .bot-content a          { color: #00ccff; text-decoration: none; }
        .bot-content a:hover    { text-decoration: underline; }

        /* scrollbar */
        #chat-box::-webkit-scrollbar {
            width: 4px;
        }

        #chat-box::-webkit-scrollbar-track {
            background: #0d0d0d;
        }

        #chat-box::-webkit-scrollbar-thumb {
            background: #333;
        }
    </style>
</head>

<body>

    <h2>meChat</h2>
    <p style="color:#555; font-size:12px; margin-bottom:16px; line-height:2.2;">
        i am a chat bot with <select id="persona-select" class="inline-select"></select> personality.<br>
        powered by <select id="model-select" class="inline-select"></select> — chat ingress secured by Prisma AIRS.
        <button id="airs-toggle" onclick="toggleAIRS()">[ 🛡️ AIRS ON ]</button><br>
        api key <input type="password" id="airs-api-key" class="inline-input" placeholder="x-pan-token" />
        &nbsp;·&nbsp;
        profile <input type="text" id="airs-profile" class="inline-input" style="width:140px;" placeholder="e.g. default" />
    </p>

    <div id="chat-box"></div>
    <div style="display:flex; gap:8px; margin-top:8px;">
        <input type="text" id="user-input" placeholder="Type a prompt..." style="flex:1;" />
        <button onclick="document.getElementById('chat-box').innerHTML=''" title="Clear chat history">🗑️ Clear</button>
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>

        // ─────────────────────────────────────────────
        // PERSONAS — name shown in chat, system prompt sent to LLM
        // ─────────────────────────────────────────────
        const PERSONAS = [
            {
                name: "Assistant",
                system: "You are a helpful, concise assistant. Answer clearly and directly."
            },
            {
                name: "Socrates",
                system: "You are Socrates. Never give direct answers. Instead, guide the user to the answer through probing questions. Stay in character at all times."
            },
            {
                name: "Pirate",
                system: "You are a salty sea pirate. Respond entirely in pirate speak — arrr, matey, shiver me timbers. Keep answers helpful but fully in character."
            },
            {
                name: "Security Analyst",
                system: "You are a senior cybersecurity analyst. Answer all questions through a security lens — threat models, attack surfaces, mitigations. Be precise and technical."
            },
            {
                name: "ELI5",
                system: "Explain everything as if the user is five years old. Use simple words, short sentences, and fun analogies. Never use jargon."
            }
        ];

        /*
         * FLOW
         * ─────────────────────────────────────────────────────────
         * sendMessage()
         *     ├── STEP 1 — POST to /api/prisma  (AIRS scan)  ← skipped if AIRS OFF
         *     ├── STEP 2 — check verdict.action
         *     │       "block" → show 🛑 BLOCKED, return   ← LLM never called
         *     │       "allow" → fall through
         *     └── STEP 3 — POST to Ollama /api/generate → display response
         * ─────────────────────────────────────────────────────────
         */

        let airsEnabled = true;

        function toggleAIRS() {
            airsEnabled = !airsEnabled;
            const btn = document.getElementById("airs-toggle");
            btn.textContent = airsEnabled ? "[ 🛡️ AIRS ON ]" : "[ 🔓 AIRS OFF ]";
            btn.style.color = airsEnabled ? "#00ccff" : "#555";
        }

        // Populate persona dropdown
        const sel = document.getElementById("persona-select");
        PERSONAS.forEach((p, i) => {
            const opt = document.createElement("option");
            opt.value = i;
            opt.textContent = p.name;
            sel.appendChild(opt);
        });

        // Populate model dropdown — fetched live from Ollama
        async function fetchModels() {
            const modelSel = document.getElementById("model-select");
            try {
                const res  = await fetch("http://localhost:11434/api/tags");
                const data = await res.json();
                modelSel.innerHTML = data.models
                    .map(m => `<option value="${m.name}">${m.name}</option>`)
                    .join("");
            } catch {
                modelSel.innerHTML = "<option>Ollama offline</option>";
            }
        }
        fetchModels();

        /*
         * ══════════════════════════════════════════════════════════════
         * WHAT THE AIRS API CALL LOOKS LIKE AS A CURL COMMAND
         * ══════════════════════════════════════════════════════════════
         *
         * curl -X POST https://service.api.aisecurity.paloaltonetworks.com/v1/scan/sync/request \
         *   -H "Content-Type: application/json" \
         *   -H "x-pan-token: YOUR_API_KEY" \
         *   -d '{
         *     "tr_id": "teach-1234567890",
         *     "ai_profile": { "profile_name": "your-profile-name" },
         *     "metadata":   { "app_name": "AIRS Teaching Demo" },
         *     "contents":   [{ "prompt": "user message goes here" }]
         *   }'
         *
         * EXAMPLE RESPONSE:
         *   { "action": "block", "category": "malicious", ... }  ← blocked
         *   { "action": "allow",                         ... }  ← allowed
         *
         * ══════════════════════════════════════════════════════════════
         * HOW THE async FUNCTION DOES THE SAME THING IN JAVASCRIPT
         * ══════════════════════════════════════════════════════════════
         *
         * The curl command above hits the Prisma AIRS cloud endpoint directly.
         * Browsers can't do that (CORS), so instead we POST to our local Node
         * proxy at localhost:3080/api/prisma — which forwards the request to
         * Prisma AIRS on our behalf and relays the response back.
         *
         *   Browser → fetch("localhost:3080/api/prisma", { body: payload })
         *                  ↓
         *             Node proxy (server.js)
         *                  ↓
         *             POST to service.api.aisecurity.paloaltonetworks.com
         *                  ↓
         *             verdict JSON returned back up the chain
         *
         * The `await` keyword pauses execution until the response arrives,
         * then we read verdict.action — "block" stops the flow, "allow"
         * lets the prompt continue to the LLM in STEP 3.
         * ══════════════════════════════════════════════════════════════
         */

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const prompt = input.value.trim();
            if (!prompt) return;

            const persona = PERSONAS[document.getElementById("persona-select").value];
            const model = document.getElementById("model-select").value;
            const airsApiKey = document.getElementById("airs-api-key").value.trim();
            const airsProfile = document.getElementById("airs-profile").value.trim();

            if (airsEnabled && (!airsApiKey || !airsProfile)) {
                alert("AIRS is enabled — please enter an API key and profile name, or toggle AIRS off.");
                return;
            }

            // Show user message — badge only shown when AIRS is on
            const msgId = "msg-" + Date.now();
            const msgEl = document.createElement("p");
            msgEl.innerHTML = `<span class="user">You:</span> ${prompt}`
                + (airsEnabled ? ` <span id="${msgId}" class="airs-badge scanning">🔍 Scanning...</span>` : "");
            chatBox.appendChild(msgEl);
            input.value = "";

            // ── STEP 1: Scan the prompt with Prisma AIRS ──────────────────────
            if (airsEnabled) {
                const badge = document.getElementById(msgId);
                let verdict;
                try {
                    const scanRes = await fetch("http://localhost:3080/api/prisma", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "x-pan-token": airsApiKey
                        },
                        body: JSON.stringify({
                            tr_id: "teach-" + Date.now(),
                            ai_profile: { profile_name: airsProfile },
                            metadata: { app_name: "AIRS Teaching Demo" },
                            contents: [{ prompt: prompt }]
                        })
                    });
                    verdict = await scanRes.json();
                } catch (err) {
                    badge.className = "airs-badge blocked";
                    badge.textContent = "⚠️ Scan error";
                    return;
                }

                // ── STEP 2: Check the verdict ──────────────────────────────────
                if (verdict.action === "block") {
                    badge.className = "airs-badge blocked";
                    badge.textContent = `🛑 Blocked · ${verdict.category}`;
                    chatBox.scrollTop = chatBox.scrollHeight;
                    return;
                }

                badge.className = "airs-badge allowed";
                badge.textContent = "✅ Allowed";
            }

            // ── STEP 3: Forward the prompt to Ollama ──────────────────────────
            try {
                const llmRes = await fetch("http://localhost:11434/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: model,
                        system: persona.system,
                        prompt: prompt,
                        stream: false
                    })
                });
                const data = await llmRes.json();
                if (data.error) throw new Error(data.error);
                const responseText = data.response ?? data.message?.content ?? "";
                if (!responseText) throw new Error("Empty response from model");
                chatBox.innerHTML += `<p><span class="bot">${persona.name}:</span></p><div class="bot-content">${marked.parse(responseText)}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (err) {
                chatBox.innerHTML += `<p style="color:red">LLM error: ${err.message}</p>`;
            }
        }

    </script>
</body>

</html>
